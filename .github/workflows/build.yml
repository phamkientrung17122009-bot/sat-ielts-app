name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
      - name: Build Web Application
        run: npm run build
      - name: Create www folder
        run: |
          mkdir www
          cp index.html www/index.html

      - name: Init Capacitor
        run: |
          npx @capacitor/cli init "SAT App" "com.sat.app" --web-dir=www

      - name: Add Android
        run: npx @capacitor/cli add android

      - name: Sync
        run: npx @capacitor/cli sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
